<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete Profile | CraveHub</title>
    
    <link rel="icon" type="image/x-icon" th:href="@{/Images/logo.png}">

    <link rel="stylesheet" th:href="@{/css/CompleteProfile.css}" />
</head>
<body>

    <div class="profile-box">
        <h2>Almost Done! 🚀</h2>
        <p>Please provide your phone number to complete your CraveHub profile.</p>

        <form th:action="@{/saveGoogleUser}" method="post">
            
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" th:value="${email}" readonly>
            </div>

            <div class="input-group">
                <label>Full Name</label>
                <input type="text" th:value="${name}" readonly>
            </div>

            <div class="input-group">
                <label>Phone Number (10 digits)</label>
                <input type="text" name="unumber" placeholder="Enter mobile number" required pattern="\d{10}" title="Please enter exactly 10 digits">
            </div>

            <button type="submit" class="submit-btn">Start Ordering Food 🍔</button>
        </form>
    </div>

</body>
</html>
