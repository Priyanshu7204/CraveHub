<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Email | CraveHub</title>
    
    <link rel="icon" type="image/x-icon" th:href="@{/Images/logo.png}">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <link rel="stylesheet" th:href="@{/css/Verify_OTP.css}">
</head>
<body>

    <div class="otp-container">
        <i class="fa-regular fa-envelope mail-icon"></i>
        
        <h2>Verify Email</h2>
        <p>We've sent a 6-digit OTP to your registered email address.</p>
        
        <p class="error-msg" th:if="${error}" th:text="${error}"></p>
        
        <form th:action="@{/verifyOtpProcess}" method="post">
            <input type="text" name="otp" placeholder="••••••" maxlength="6" required autocomplete="off">
            <button type="submit" class="btn-verify">Verify & Register</button>
        </form>
    </div>

</body>
</html>
